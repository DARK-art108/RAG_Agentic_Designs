site_name: AI Design Patterns
site_description: >-
  Advanced RAG, agentic design, and production scenarios for senior ML & LLM engineers.
site_author: Ritesh Yadav
repo_url: ""
edit_uri: ""

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      pygments_style: colorful
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 5

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Table of contents: guide/index.md
  - Part I — Preparation: guide/part-i.md
  - Part II — Scenarios:
      - Overview: guide/part-ii/index.md
      - "Ch.1 Production incidents": guide/part-ii/chapter-01-production.md
      - "Ch.2 System design": guide/part-ii/chapter-02-system-design.md
      - "Ch.3 Agentic AI": guide/part-ii/chapter-03-agentic.md
      - "Ch.4 Memory & context": guide/part-ii/chapter-04-memory.md
      - "Ch.5 Advanced + SPAR": guide/part-ii/chapter-05-advanced.md
  - Part III — HLD / Guardrails: guide/part-iii.md

copyright: Copyright &copy; Ritesh Yadav — Advanced ML / LLM interview preparation
